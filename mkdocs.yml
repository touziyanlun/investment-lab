      - 贵州茅台 (600519): research/moutai-600519-deep-dive-2026-05.md
      - 海光信息 (688041): research/hygon-688041-deep-dive-2026-05.md
      - 摩尔线程 (688795): research/moore-threads-688795-deep-dive-2026-05.md
