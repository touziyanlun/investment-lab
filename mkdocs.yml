site_name: 投资严论 · The Rigorous Investor
site_description: 多资产长期价值投资独立研究 — 遵循芒格多元思维模型与巴菲特价值投资理念
site_url: https://touziyanlun.github.io/investment-lab/
repo_name: touziyanlun/investment-lab
repo_url: https://github.com/touziyanlun/investment-lab
edit_uri: ""

theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 浅色模式
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 深色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/navy.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - admonition
  - footnotes

plugins:
  - search:
      lang: zh

nav:
  - 首页:
      - 关于本站: index.md
      - 更新时间线: timeline.md
  - 宏观快报:
      - 2026年5月: research/macro-briefing-2026-05.md
      - W19周度快报(5.4-10): research/weekly-briefing-2026-05-11.md
      - 五一假期深度复盘: research/macro-mayday-2026-05.md
  - 投资组合:
      - AI智能体20成长股: research/ai-agent-20-portfolio-2026-05.md
      - 国产算力10股: research/domestic-computing-10-portfolio-2026-05.md
      - 红利组合: research/dividend-portfolio-2026-05.md
      - 华为哈勃5股: research/huawei-hubble-portfolio-2026-05.md
  - 行业分析:
      - 全球半导体赛道9家: research/semiconductor-sector-deep-dive-2026-05.md
      - CPU 涨价周期: research/cpu-price-cycle-analysis-2026-05.md
      - 全球存储产业链: research/global-storage-industry-full-chain-analysis-2026-05.md
      - 国产 GPU 全面对比: research/china-gpu-comprehensive-comparison-2026-05.md
