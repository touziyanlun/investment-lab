      - 英伟达 NVIDIA (NVDA): research/nvidia-nvda-deep-dive-2026-05.md
      - 谷歌 Google (GOOGL): research/google-googl-deep-dive-2026-05.md
      - 闪迪 SanDisk (SNDK): research/sandisk-sndk-deep-dive-2026-05.md
      - 美光科技 Micron (MU): research/micron-mu-deep-dive-2026-05.md
      - SK海力士 (000660): research/sk-hynix-000660-deep-dive-2026-05.md
      - 三星电子 (005930): research/samsung-005930-deep-dive-2026-05.md
      - 中际旭创 (300308): research/zhongji-innolight-300308-deep-dive-2026-05.md
