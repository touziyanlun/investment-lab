<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #score {
    color: #eee;
    font-size: 24px;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  #canvas-wrapper {
    position: relative;
    width: min(400px, 95vw);
    height: min(400px, 95vw);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 4px;
  }
  #game-over {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    color: #eee;
  }
  #game-over h2 { font-size: 28px; margin-bottom: 8px; }
  #game-over p { font-size: 18px; margin-bottom: 20px; }
  #game-over button {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 12px 32px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
  }
  #game-over button:focus-visible {
    outline: 2px solid #eee;
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <div id="score">分数: 0</div>
  <div id="canvas-wrapper">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="game-over">
      <h2>游戏结束</h2>
      <p id="final-score"></p>
      <button id="restart">重新开始</button>
    </div>
  </div>
  <script>
const COLS = 20;
const ROWS = 20;
const CELL = 20; // canvas internal pixel size per cell
const SPEED = 150; // ms per frame

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

const scoreEl = document.getElementById('score');
const gameOverEl = document.getElementById('game-over');
const finalScoreEl = document.getElementById('final-score');
const restartBtn = document.getElementById('restart');

let snake, food, direction, nextDirection, score, gameLoop, gameRunning;

function init() {
  snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10},
  ];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  score = 0;
  gameRunning = true;
  scoreEl.textContent = '分数: 0';
  gameOverEl.style.display = 'none';
  placeFood();
}

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  const free = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!occupied.has(`${x},${y}`)) free.push({x, y});
    }
  }
  food = free.length > 0 ? free[Math.floor(Math.random() * free.length)] : null;
}

function update() {
  direction = nextDirection;
  const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

  // Collision: walls
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }
  // Collision: self
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);
  if (food && head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = '分数: ' + score;
    placeFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Food
  if (food) {
    ctx.fillStyle = '#e94560';
    ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
  }

  // Snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#53d769' : '#4ecca3';
    ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
  });
}

function tick() {
  update();
  draw();
}

function gameOver() {
  gameRunning = false;
  clearInterval(gameLoop);
  finalScoreEl.textContent = '分数: ' + score;
  gameOverEl.style.display = 'flex';
}

function start() {
  if (gameLoop) clearInterval(gameLoop);
  init();
  draw();
  gameLoop = setInterval(tick, SPEED);
}

// Keyboard input
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  switch (e.key) {
    case 'ArrowUp':    if (direction.y === 0) nextDirection = {x: 0, y: -1}; break;
    case 'ArrowDown':  if (direction.y === 0) nextDirection = {x: 0, y: 1}; break;
    case 'ArrowLeft':  if (direction.x === 0) nextDirection = {x: -1, y: 0}; break;
    case 'ArrowRight': if (direction.x === 0) nextDirection = {x: 1, y: 0}; break;
    default: return;
  }
  e.preventDefault();
  }
});

// Touch swipe
let touchStartX, touchStartY;
const MIN_SWIPE = 30;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: false});

canvas.addEventListener('touchend', e => {
  if (!gameRunning) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  if (Math.max(absDx, absDy) < MIN_SWIPE) return;

  if (absDx > absDy) {
    // Horizontal
    if (dx > 0 && direction.x === 0) nextDirection = {x: 1, y: 0};
    else if (dx < 0 && direction.x === 0) nextDirection = {x: -1, y: 0};
  } else {
    // Vertical
    if (dy > 0 && direction.y === 0) nextDirection = {x: 0, y: 1};
    else if (dy < 0 && direction.y === 0) nextDirection = {x: 0, y: -1};
  }
});

restartBtn.addEventListener('click', start);

start();
  </script>
</body>
</html>
