<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>贪吃蛇 · 投资严论</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1B2A;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.game{text-align:center}
.score{color:#c9a95c;font-size:20px;margin-bottom:8px;font-weight:bold}
canvas{display:block;margin:0 auto;background:#152238;border:2px solid #1A7A7A;border-radius:4px}
.msg{color:#94A3B8;font-size:14px;margin:10px 0;min-height:20px}
.btns{display:flex;gap:8px;justify-content:center;margin-top:4px}
.btns button{background:#1A7A7A;color:#fff;border:none;padding:10px 32px;font-size:16px;border-radius:6px;cursor:pointer}
.btns button:active{background:#0F5E5E}
.dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:4px;justify-content:center;margin-top:10px}
.db{width:56px;height:56px;border:none;border-radius:10px;background:#1A2A3A;color:#c9a95c;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.db:active{background:#1A7A7A;color:#fff}
@media(min-width:768px){.dpad{display:none}.msg::after{content:' | 键盘方向键控制'}}
</style>
</head>
<body>
<div class="game">
  <div class="score">🐍 <span id="score">0</span></div>
  <canvas id="c"></canvas>
  <div class="msg" id="msg">点击「开始」或按空格键</div>
  <div class="btns">
    <button id="start">开始</button>
    <button id="pause" style="display:none">暂停</button>
  </div>
  <div class="dpad">
    <div></div><button class="db" id="up">▲</button><div></div>
    <button class="db" id="left">◀</button><div></div><button class="db" id="right">▶</button>
    <div></div><button class="db" id="down">▼</button><div></div>
  </div>
</div>
<script>
const SIZE = 20, CELL = 18, GAP = 1;
const W = SIZE * (CELL + GAP) + GAP;
const c = document.getElementById('c');
c.width = W; c.height = W;
const ctx = c.getContext('2d');

const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');
const startBtn = document.getElementById('start');
const pauseBtn = document.getElementById('pause');

let snake, food, dir, nextDir, score, timer, running, paused;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; paused = false;
  scoreEl.textContent = '0';
  msgEl.textContent = '';
  startBtn.style.display = 'none';
  pauseBtn.style.display = 'inline-block';
  pauseBtn.textContent = '暂停';
  placeFood();
}

function placeFood() {
  const set = new Set(snake.map(s => s.x+','+s.y));
  const free = [];
  for (let x=0;x<SIZE;x++) for (let y=0;y<SIZE;y++) if (!set.has(x+','+y)) free.push({x,y});
  food = free[Math.random()*free.length|0];
}

function step() {
  dir = nextDir;
  const h = snake[0], nx = h.x+dir.x, ny = h.y+dir.y;
  if (nx<0||nx>=SIZE||ny<0||ny>=SIZE) return end(false);
  if (snake.some(s=>s.x===nx&&s.y===ny)) return end(false);
  snake.unshift({x:nx,y:ny});
  if (food && nx===food.x && ny===food.y) {
    score += 10; scoreEl.textContent = score;
    placeFood();
    if (snake.length === SIZE*SIZE) return end(true);
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#152238'; ctx.fillRect(0,0,W,W);
  snake.forEach((s,i) => {
    const x = GAP + s.x*(CELL+GAP), y = GAP + s.y*(CELL+GAP);
    ctx.fillStyle = i===0 ? '#53d769' : '#4ecca3';
    ctx.beginPath();
    ctx.roundRect(x, y, CELL, CELL, i===0?5:3);
    ctx.fill();
  });
  if (food) {
    const fx = GAP + food.x*(CELL+GAP) + CELL/2, fy = GAP + food.y*(CELL+GAP) + CELL/2;
    ctx.fillStyle = '#e94560';
    ctx.beginPath(); ctx.arc(fx, fy, CELL/2-2, 0, Math.PI*2); ctx.fill();
  }
}

function end(won) {
  running = false; clearInterval(timer);
  msgEl.textContent = won ? '🎉 通关！' : '游戏结束 · 得分: '+score;
  startBtn.textContent = '重新开始';
  startBtn.style.display = 'inline-block';
  pauseBtn.style.display = 'none';
}

function setDir(dx, dy) {
  if (!running || paused) return;
  if (dx + dir.x === 0 && dy + dir.y === 0) return;
  nextDir = {x:dx, y:dy};
}

function start() {
  if (timer) clearInterval(timer);
  init(); draw();
  running = true;
  timer = setInterval(step, 130);
}

function togglePause() {
  if (!running) return;
  if (paused) {
    paused = false; pauseBtn.textContent = '暂停';
    timer = setInterval(step, 130);
    msgEl.textContent = '';
  } else {
    paused = true; clearInterval(timer);
    pauseBtn.textContent = '继续';
    msgEl.textContent = '已暂停';
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!running) start(); else togglePause();
    return;
  }
  const map = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
});

// D-pad
['up','down','left','right'].forEach((id,i) => {
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', e => { e.preventDefault(); setDir(...dirs[i]); });
});

// Start / Pause buttons
startBtn.addEventListener('click', start);
pauseBtn.addEventListener('click', togglePause);

// Initial draw
init(); running = false; clearInterval(timer); paused = false;
scoreEl.textContent = '0'; msgEl.textContent = '点击「开始」或按空格键';
startBtn.style.display = 'inline-block'; pauseBtn.style.display = 'none';
draw();
</script>
</body>
</html>
